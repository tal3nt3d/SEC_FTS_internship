version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: my_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d my_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fastapi_app
    env_file:
      - .env
    restart: always
    depends_on:
      - db
    environment:
      - APP_ENV=dev
    ports:
      - "8000:8000"

  test:
    build: .
    depends_on:
      - db
    command: pytest
    profiles:
      - test

volumes:
  postgres_data: